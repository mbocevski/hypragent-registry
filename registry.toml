# HyprAgent MCP Server Registry — bundled snapshot v1
#
# This file ships with the hypragent-core package and provides the baseline
# set of well-known MCP servers available for one-click install.
#
# Field reference per [[servers]] entry:
#   id                 unique slug; used as the [mcp.<id>] key in config.toml
#   name               human-readable label shown in the UI
#   description        one-line description (shown in server list + install dialog)
#   icon               emoji or absolute image URL; shown beside the name
#   homepage           upstream project / documentation URL
#   type               transport: "stdio" | "sse" | "http"
#   command            executable to spawn (stdio only)
#   args               argument list passed to command (stdio only)
#   url                server URL (sse/http only; omit for stdio)
#   default_permission suggested permission level: "allow" | "ask" | "deny"
#   signature          reserved for future ed25519 signing; always "" in this version
#
# env_required / env_optional: inline array of {name, description, secret}
#   name        environment variable name
#   description shown to the user in the install dialog
#   secret      true  → value written to secret.toml [mcp.<id>]
#               false → value written to config.toml  [mcp.<id>.env]

[[servers]]
id          = "github"
name        = "GitHub"
description = "Browse repositories, issues, pull requests and code search"
icon        = "🐙"
homepage    = "https://github.com/modelcontextprotocol/servers/tree/main/src/github"
type        = "stdio"
command     = "npx"
args        = ["-y", "@modelcontextprotocol/server-github"]
url         = ""
default_permission = "ask"
signature   = ""
env_required = [
    {name = "GITHUB_PERSONAL_ACCESS_TOKEN", description = "Personal Access Token with repo scope", secret = true},
]
env_optional = []

[[servers]]
id          = "google-workspace"
name        = "Google Workspace"
description = "Gmail, Calendar, Drive, Docs, Sheets, Slides, Forms, Tasks, Contacts and Chat in one stdio MCP. Community-maintained (taylorwilsdon). Setup is heavier than GitHub/Slack: you create an OAuth 2.0 client in your own Google Cloud project, enable the relevant APIs (Gmail / Drive / Calendar / Docs / …), then grant consent in a browser on first run."
icon        = "📅"
homepage    = "https://github.com/taylorwilsdon/google_workspace_mcp"
type        = "stdio"
command     = "uvx"
args        = ["workspace-mcp"]
url         = ""
default_permission = "ask"
signature   = ""
env_required = [
    {name = "GOOGLE_OAUTH_CLIENT_ID", description = "OAuth 2.0 client ID. Create at console.cloud.google.com → APIs & Services → Credentials. Use the 'Desktop app' application type — the server uses a localhost loopback for the consent callback.", secret = true},
    {name = "GOOGLE_OAUTH_CLIENT_SECRET", description = "OAuth 2.0 client secret paired with the client ID above.", secret = true},
]
env_optional = [
    {name = "OAUTHLIB_INSECURE_TRANSPORT", description = "Set to '1' to allow http://localhost OAuth redirects during the local consent flow. Required for the loopback callback; safe on a desktop where the callback never leaves the machine.", secret = false},
    {name = "USER_GOOGLE_EMAIL", description = "Single-user mode: pin the server to one Google account so tool calls don't need to pass an email each time. Omit for multi-account mode.", secret = false},
    {name = "WORKSPACE_MCP_PORT", description = "Local port for the OAuth callback listener (default 8000). Only relevant during the one-time consent flow.", secret = false},
]

[[servers]]
id          = "slack"
name        = "Slack"
description = "Read channels and messages, post to your Slack workspace"
icon        = "💬"
homepage    = "https://github.com/modelcontextprotocol/servers/tree/main/src/slack"
type        = "stdio"
command     = "npx"
args        = ["-y", "@modelcontextprotocol/server-slack"]
url         = ""
default_permission = "ask"
signature   = ""
env_required = [
    {name = "SLACK_BOT_TOKEN", description = "Bot token from api.slack.com (starts with xoxb-)", secret = true},
    {name = "SLACK_TEAM_ID",   description = "Workspace/team ID from your Slack URL (starts with T)", secret = false},
]
env_optional = []

[[servers]]
id          = "notion"
name        = "Notion"
description = "Read and write Notion pages and databases"
icon        = "📝"
homepage    = "https://github.com/makenotion/notion-mcp-server"
type        = "stdio"
command     = "npx"
args        = ["-y", "@notionhq/notion-mcp-server"]
url         = ""
default_permission = "ask"
signature   = ""
env_required = [
    {name = "OPENAPI_MCP_HEADERS", description = "JSON headers including Notion API key, e.g. {\"Authorization\": \"Bearer secret_xxx\", \"Notion-Version\": \"2022-06-28\"}", secret = true},
]
env_optional = []

[[servers]]
id          = "linear"
name        = "Linear"
description = "Manage Linear issues, projects and teams"
icon        = "🔷"
homepage    = "https://github.com/modelcontextprotocol/servers"
type        = "stdio"
command     = "npx"
args        = ["-y", "linear-mcp-server"]
url         = ""
default_permission = "ask"
signature   = ""
env_required = [
    {name = "LINEAR_API_KEY", description = "Linear API key from Settings → API", secret = true},
]
env_optional = []
